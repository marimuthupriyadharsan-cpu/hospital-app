
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hospital Management - Home Test Change</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <h2>🏥 HealthCare</h2>
        <a href="index.html" class="active">Overview</a>
        <a href="booking.html">Book Appointment</a>
        <a href="waiting.html" class="active">Waiting Queue</a>
    <a href="completed.html">Completed Queue</a>
    
    </div>
    <div class="main-content">
        <h1>Welcome, Admin</h1>
        <div style="display: flex; gap: 20px; margin-top: 30px;">
            <div class="container" style="flex: 1; border-top: 5px solid #ef4444;">
                <h3>Waiting Patients</h3>
                <p id="waitCount" style="font-size: 48px; font-weight: bold; color: #ef4444;">0</p>
            </div>
            <div class="container" style="flex: 1; border-top: 5px solid #22c55e;">
                <h3>Completed Today</h3>
                <p id="doneCount" style="font-size: 48px; font-weight: bold; color: #22c55e;">0</p>
            </div>
        </div>
    </div>
    <script>
        const apps = JSON.parse(localStorage.getItem('apps') || '[]');
        document.getElementById('waitCount').innerText = apps.filter(a => a.status === 'Waiting').length;
        document.getElementById('doneCount').innerText = apps.filter(a => a.status === 'Completed').length;
    </script>
</body>
</html>
